services:
  app:
    image: mcr.microsoft.com/devcontainers/python:1-3.11-bookworm
    volumes:
      - ..:/workspaces/${LOCAL_WORKSPACE_FOLDER_BASENAME:-2026SE_MajorProject_Thribhu.K}:cached
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tppr_storage
      SECRET_KEY: dev-secret-key-change-me
      JWT_SECRET_KEY: dev-jwt-secret-change-me
      BACKEND_DEBUG_MODE: "1"
      BACKEND_ALLOWED_ORIGINS: http://localhost:5173

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tppr_storage
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
